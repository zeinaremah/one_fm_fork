name: Copilot Bug Fix Workflow

on:
  issues:
    types: [labeled]


concurrency:
  group: copilot-bugfix-${{ github.event.issue.number }}
  cancel-in-progress: true


permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  notify-start:
    name: Notify Issue Reporter
    runs-on: ubuntu-latest

    # Only run when copilot-bugfix label is applied
    if: contains(github.event.issue.labels.*.name, 'copilot-bugfix')

    steps:
      - name: Post initial comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🤖 **Copilot Bug Fix Agent**
                  🚀 The bug fixing agent is on it!

                  I've started analyzing this issue and will generate a fix if possible. 
                  You'll be notified once a pull request is ready.`
            });
  analyze-bug:
    name: Analyze Bug & Generate Fix
    runs-on: ubuntu-latest
    
    # Only run when copilot-bugfix label is applied
    if: contains(github.event.issue.labels.*.name, 'copilot-bugfix')
    
    outputs:
      fix_generated: ${{ steps.validate_issue.outputs.fix_generated == 'false' && 'false' || steps.generate_fix.outputs.fix_generated }}
      pr_branch: ${{ steps.setup_branch.outputs.branch_name }}
      root_cause: ${{ steps.generate_fix.outputs.root_cause }}
      files_affected: ${{ steps.generate_fix.outputs.files_affected }}
      code_changes: ${{ steps.generate_fix.outputs.code_changes }}
      tests: ${{ steps.generate_fix.outputs.tests }}
      verification: ${{ steps.generate_fix.outputs.verification }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0
      
      - name: Extract issue details
        id: extract_issue
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          # Extract issue information from environment (populated via GitHub context)
          
          # (Note) We no longer write issue content into $GITHUB_ENV to avoid
          # potential environment variable injection. Downstream steps should
          # use step outputs or the GitHub context directly.
          
          # Output for reference and for use in later steps
          cat << EOF >> "$GITHUB_OUTPUT"
          issue_number=$ISSUE_NUMBER
          issue_title<<ISSUE_TITLE
          $ISSUE_TITLE
          ISSUE_TITLE
          issue_author<<ISSUE_AUTHOR
          $ISSUE_AUTHOR
          ISSUE_AUTHOR
          issue_body<<ISSUE_BODY
          $ISSUE_BODY
          ISSUE_BODY
          EOF
      
      - name: Validate issue format
        id: validate_issue
        run: |
          # Check if issue has substantial description
          BODY_LENGTH=$(echo "${{ steps.extract_issue.outputs.issue_body }}" | wc -c)
          
          if [ $BODY_LENGTH -lt 50 ]; then
            echo "⚠️  Issue description is too vague or empty."
            echo "fix_generated=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "fix_generated=true" >> $GITHUB_OUTPUT
          echo "✅ Issue description looks sufficient"
      
      - name: Load SKILL.md
        id: load_skills
        if: steps.validate_issue.outputs.fix_generated == 'true'
        run: |
          if [ ! -f ".github/skills/copilot-bug-fix/SKILL.md" ]; then
            echo "❌ SKILL.md not found at .github/skills/copilot-bug-fix/SKILL.md"
            exit 1
          fi
          
          SKILLS_CONTENT=$(cat .github/skills/copilot-bug-fix/SKILL.md)
          
          # Save to output file for use in Copilot API call
          echo "$SKILLS_CONTENT" > /tmp/skills.md
          echo "✅ SKILL.md loaded successfully"
      
      - name: Set up feature branch
        id: setup_branch
        if: steps.validate_issue.outputs.fix_generated == 'true'
        run: |
          BRANCH_NAME="fix/issue-${{ github.event.issue.number }}"
          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          echo "🔀 Will create branch: ${BRANCH_NAME}"
    
      - name: Call Copilot API for fix generation
        id: generate_fix
        if: steps.validate_issue.outputs.fix_generated == 'true'
        env:
          COPILOT_API_KEY: ${{ secrets.COPILOT_API_KEY }}
          GITHUB_EVENT: ${{ toJson(github.event) }}
        run: |
          set -euo pipefail

          SKILLS_CONTENT=$(cat /tmp/skills.md)

          PAYLOAD=$(echo "$GITHUB_EVENT" | jq \
            --arg skills "$SKILLS_CONTENT" \
            '{
              model: "copilot-bug-fix-v15",
              # CHANGE: Extract values from JSON object using jq selectors
              # .issue.number converts to string, .issue.title and .issue.body are safe
              prompt: ("You are a Frappe/ERPNext v15 bug-fixing specialist.\n\nSkills:\n" + $skills + "\n\nIssue #" + (.issue.number | tostring) + ": " + .issue.title + "\n\nDescription:\n" + .issue.body + "\n\nRespond with:\n1. Root Cause Analysis:\n2. Files Affected:\n3. Code Changes:\n4. Tests:\n5. Verification:"),
              max_tokens: 1500
            }'
          )

          echo "📋 Sending to Copilot API..."
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $COPILOT_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            https://api.github.com/copilot/completions)

          FIX=$(echo "$RESPONSE" | jq -r '.choices[0].text')

          if [ -z "$FIX" ] || [ "$FIX" = "null" ]; then
            echo "fix_generated=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Parse structured sections from Copilot output
          ROOT_CAUSE=$(echo "$FIX" | sed -n '/Root Cause Analysis:/,/Files Affected:/p' | sed '1d;$d')
          FILES=$(echo "$FIX" | sed -n '/Files Affected:/,/Code Changes:/p' | sed '1d;$d')
          CODE=$(echo "$FIX" | sed -n '/Code Changes:/,/Tests:/p' | sed '1d;$d')
          TESTS=$(echo "$FIX" | sed -n '/Tests:/,/Verification:/p' | sed '1d;$d')
          VERIFY=$(echo "$FIX" | sed -n '/Verification:/,$p' | sed '1d')

          echo "$FIX" > copilot_fix.txt

          # Save structured outputs for downstream jobs
          echo "fix_generated=true" >> $GITHUB_OUTPUT
          echo "root_cause<<EOF" >> $GITHUB_OUTPUT
          echo "$ROOT_CAUSE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "files_affected<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "code_changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CODE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "tests<<EOF" >> $GITHUB_OUTPUT
          echo "$TESTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "verification<<EOF" >> $GITHUB_OUTPUT
          echo "$VERIFY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "✅ Fix generated and structured outputs saved"
      # ================================================================
      
      - name: Upload fix artifact
        if: steps.generate_fix.outputs.fix_generated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: copilot-fix
          path: copilot_fix.txt
          retention-days: 1
      
      - name: Check fix generation status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🤖 **Copilot Bug Fix Agent**
                  ❌ **Error generating fix**

                  The agent encountered an issue while analyzing the bug. This might be because:
                  - The bug description is unclear or incomplete
                  - The bug is outside the agent's scope (requires new features)
                  - The bug cannot be fixed with minimal changes

                  **Next Steps:**
                  1. Check the workflow logs for details
                  2. Provide more context in the issue description
                  3. Or manually assign this for review

                  ---
                  *This is an automated comment from the Copilot Bug Fix Agent.*`
              });
  
  create-fix-pr:
    name: Create Fix PR
    runs-on: ubuntu-latest
    needs: analyze-bug
    if: needs.analyze-bug.outputs.fix_generated == 'true'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0
      
      - name: Download fix artifact
        uses: actions/download-artifact@v4
        with:
          name: copilot-fix
      
      - name: Create feature branch
        run: |
          BRANCH_NAME="${{ needs.analyze-bug.outputs.pr_branch }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"
          echo "✅ Created branch: ${BRANCH_NAME}"
      
      - name: Set up Python (for Frappe-specific fixes)
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          # Install minimal dependencies needed to validate Python syntax
          pip install --upgrade pip
          pip install black flake8
          echo "✅ Dependencies installed"
      
      - name: Apply Copilot-generated fix
        id: apply_fix
        run: |
          set -euo pipefail
          if [ ! -f copilot_fix.txt ]; then
            echo "❌ No fix file found"
            exit 1
          fi

          # Apply fix (this assumes Copilot outputs patch/diff format)
          git apply copilot_fix.txt || {
            echo "⚠️ Could not apply patch directly, manual review required"
            exit 1
          }

          echo "apply_status=applied" >> $GITHUB_OUTPUT
          echo "✅ Copilot fix applied"

      
      - name: Validate code style
        run: |
          # Run basic validation on Python files
          # Adjust to match your project's linting rules
          
          if [ -d "one_fm" ]; then
            echo "📋 Checking Python syntax..."
            find one_fm -name '*.py' -print0 | xargs -0 python -m py_compile
            echo "✅ Python syntax check complete"
          fi
      
      - name: Run tests (if fix affects code)
        id: run_tests
        continue-on-error: true
        run: |
          # Placeholder: Run your test suite
          # Adjust based on your actual test setup
          
          if [ -f "pytest.ini" ] || [ -f "setup.py" ]; then
            echo "🧪 Running test suite..."
            # pytest -v || true
            echo "tests_passed=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  No test configuration found"
            echo "tests_passed=unknown" >> $GITHUB_OUTPUT
          fi
      
      - name: Create pull request
        id: create_pr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: #${{ github.event.issue.number }} - Fix bug identified in issue"
          title: "[COPILOT FIX] ${{ github.event.issue.title }}"
          body: |
            ## 🤖 Automated Bug Fix
            
            **Related Issue:** #${{ github.event.issue.number}}
            **Created by:** Copilot Bug Fix Agent
            
            ---
            
            ### 📋 Analysis Summary
            
            **Root Cause Analysis:**  
            ${{ needs.analyze-bug.outputs.root_cause }}
            
            **Files Affected:**  
            ${{ needs.analyze-bug.outputs.files_affected }}
            
            **Code Changes:**  
            ```
            ${{ needs.analyze-bug.outputs.code_changes }}
            ```
            
            **Tests:**  
            ${{ needs.analyze-bug.outputs.tests }}
            
            **Verification:**  
            ${{ needs.analyze-bug.outputs.verification }}
            
            ---
            
            ### 🔍 Review Checklist
            
            Before merging, please verify:
            - [ ] Root Cause explanation is clear
            - [ ] Fix scope is minimal and focused
            - [ ] No unrelated refactoring or features
            - [ ] Code quality follows Frappe v15 standards
            - [ ] Security checks are in place
            - [ ] Tests are included/updated
            - [ ] All tests pass
            - [ ] Different roles tested if relevant
            - [ ] No console errors (if frontend changes)
            
            ---
            
            ### 📖 Framework Used
            - Frappe Framework: v15.x
            - ERPNext: v15.x
            - Python: 3.11+
            - Guidelines: See [`.github/skills/copilot-bug-fix/SKILL.md`](.github/skills/copilot-bug-fix/SKILL.md)
            
            ---
            
            ### ⚠️ Important Notes
            This is an **AI-generated fix**. Human review is mandatory before merging.
            
            If the fix doesn't look right:
            1. Add a comment explaining what needs to change
            2. Adjust or regenerate the fix
            3. Close the PR if it's out of scope
          branch: ${{ needs.analyze-bug.outputs.pr_branch }}
          delete-branch: true
          reviewers: ${{ github.event.issue.user.login }}
          labels: |
            copilot-generated
            bug-fix
          milestone: ${{ github.event.issue.milestone.number || '' }}
      
      - name: Comment on original issue
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ steps.create_pr.outputs.pull-request-number }}';
            const prUrl = '${{ steps.create_pr.outputs.pull-request-url }}';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🤖 **Copilot Bug Fix Agent**
                  ✅ **Fix generated successfully!**

                  A pull request has been created with a fix for this bug:

                  **PR:** [#${prNumber}](${prUrl})

                  ### Next Steps:
                  1. 👀 Review the changes in the PR
                  2. ✅ Verify the fix solves the problem
                  3. 🧪 Run tests locally if needed
                  4. ✔️ Approve and merge when ready

                  The PR includes a detailed checklist for review. Please make sure all items are checked before merging.

                  ---
                  *This is an automated comment from the Copilot Bug Fix Agent.*`
              });
      
      - name: Add workflow badge comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 📊 Workflow Status
              - Issue Created: ✅
              - Bug Analysis: ✅
              - PR Generated: ✅
              - Assigned to Reporter: ✅

              ---
              *Workflow completed at: \`${new Date().toISOString()}\`*`
              });

  handle-invalid-scope:
    name: Handle Invalid Scope
    runs-on: ubuntu-latest
    needs: analyze-bug
    if: needs.analyze-bug.outputs.fix_generated == 'false'
    
    steps:
      - name: Comment about invalid scope
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🤖 **Copilot Bug Fix Agent**
                  ⚠️ **Unable to generate fix**

                  This bug may be outside the agent's scope. The Copilot Bug Fix Agent can fix:

                  ✅ **In Scope:**
                  - Logic errors in existing code
                  - SQL query bugs
                  - Permission/security issues
                  - Data validation errors
                  - Performance problems in existing code
                  - Improved error handling

                  ❌ **Out of Scope:**
                  - Adding new features
                  - Creating new DocTypes or fields
                  - Database schema changes
                  - Refactoring unrelated code
                  - Optional enhancements

                  ### What to do:
                  1. **If this is a bug fix:** Provide more details in the issue description
                  2. **If this is a feature request:** Close this issue and create a feature request instead
                  3. **If this needs architecture changes:** This requires manual review

                  ---
                  *This is an automated comment from the Copilot Bug Fix Agent.*`
              });